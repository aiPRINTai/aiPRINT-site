<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Email Verified — aiPRINT.ai</title>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="description" content="Your aiPRINT.ai email has been verified — welcome aboard."/>
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="aiPRINT.ai" />
  <meta property="og:title" content="Email Verified — aiPRINT.ai" />
  <meta property="og:description" content="Your aiPRINT.ai email has been verified — welcome aboard." />
  <meta property="og:image" content="https://aiprint.ai/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Email Verified — aiPRINT.ai" />
  <meta name="twitter:image" content="https://aiprint.ai/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0a0f1d; color:#e7eef8; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .glass { background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); }
    .check { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#4ade80,#22c55e); display:flex; align-items:center; justify-content:center; font-size:2.4rem; margin:0 auto; box-shadow:0 16px 40px rgba(34,197,94,.35); }
    @keyframes pop { 0% { transform:scale(0); } 70% { transform:scale(1.15); } 100% { transform:scale(1); } }
    .pop { animation: pop .5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .credits-chip { display:inline-flex; align-items:center; gap:.4rem; background:rgba(251,191,36,.15); border:1px solid rgba(251,191,36,.35); padding:.4rem .8rem; border-radius:999px; font-weight:700; }
    .btn-primary { display:inline-block; background:#fff; color:#000; font-weight:800; padding:.85rem 2rem; border-radius:.75rem; text-decoration:none; transition:background .15s, transform .15s; }
    .btn-primary:hover { background:#f1f5f9; transform:translateY(-1px); }
  </style>
  <script defer src="/js/analytics.js"></script>
</head>
<body class="min-h-screen grid place-items-center px-5 py-10">
  <div class="glass rounded-2xl p-10 max-w-md w-full text-center">
    <div class="check pop mb-5">✓</div>
    <h1 class="text-3xl font-extrabold mb-2">Email verified!</h1>
    <p class="text-gray-400 mb-5">You're all set — your account is active and you've been signed in.</p>

    <div id="creditsBadge" class="mb-7 hidden">
      <div class="credits-chip">
        <span class="text-yellow-300">⚡</span>
        <span id="creditsCount">10</span>
        <span class="text-sm text-gray-300 font-normal">free credits ready</span>
      </div>
    </div>

    <a id="startCreatingBtn" href="/" class="btn-primary">Start creating →</a>
    <div class="mt-4">
      <a href="/account.html" class="text-sm text-indigo-300 hover:text-indigo-200">Go to my account</a>
    </div>
  </div>

  <script>
    // Pull token + optional pending-share slug from URL (set by /api/auth/verify).
    // If a slug is present, this user came from the checkout-signup gate with a
    // live preview; route them to /?s=<slug> so the design rehydrates instead
    // of dropping them onto an empty generator.
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const shareSlug = (params.get('s') || '').match(/^[a-zA-Z0-9]{6,16}$/)?.[0] || null;
    if (token) {
      try {
        localStorage.setItem('auth_token', token);
        history.replaceState({}, '', '/verified.html');
      } catch (e) {}
    }
    if (shareSlug) {
      const btn = document.getElementById('startCreatingBtn');
      if (btn) btn.setAttribute('href', `/?s=${encodeURIComponent(shareSlug)}`);
    }

    // Fetch the user's current credit balance so the landing page tells them
    // exactly what they have (not a hardcoded guess).
    (async () => {
      const t = localStorage.getItem('auth_token');
      if (!t) return;
      try {
        const r = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${t}` } });
        if (!r.ok) return;
        const { user } = await r.json();
        if (user && typeof user.credits_balance === 'number') {
          document.getElementById('creditsCount').textContent = user.credits_balance;
          document.getElementById('creditsBadge').classList.remove('hidden');
        }
      } catch (e) { /* non-fatal */ }
    })();
  </script>
</body>
</html>
