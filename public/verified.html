<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Email Verified — aiPRINT.ai</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0a0f1d; color:#e7eef8; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .glass { background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); }
    .check { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#4ade80,#22c55e); display:flex; align-items:center; justify-content:center; font-size:2.2rem; margin:0 auto; box-shadow:0 12px 32px rgba(34,197,94,.35); }
    @keyframes pop { 0% { transform:scale(0); } 70% { transform:scale(1.15); } 100% { transform:scale(1); } }
    .pop { animation: pop .5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  </style>
  <script defer src="/js/analytics.js"></script>
</head>
<body class="min-h-screen grid place-items-center px-5">
  <div class="glass rounded-2xl p-10 max-w-md w-full text-center">
    <div class="check pop mb-5">✓</div>
    <h1 class="text-3xl font-extrabold mb-2">Email verified!</h1>
    <p class="text-gray-400 mb-7">You're all set. Your account is now active and you've been signed in.</p>
    <a href="/" class="inline-block bg-white text-black font-bold px-8 py-3 rounded-xl hover:bg-gray-100 transition-colors">
      Start creating →
    </a>
    <div class="mt-4">
      <a href="/account.html" class="text-sm text-indigo-300 hover:text-indigo-200">Go to my account</a>
    </div>
  </div>

  <script>
    // Pull token from URL (set by /api/auth/verify) and stash it for the auth client.
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    if (token) {
      try {
        localStorage.setItem('auth_token', token);
        // Clean URL so the token isn't sitting in the address bar
        history.replaceState({}, '', '/verified.html');
      } catch (e) {}
    }
  </script>
</body>
</html>
